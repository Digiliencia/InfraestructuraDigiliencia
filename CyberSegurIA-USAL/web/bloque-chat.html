<script>
(function() {
  var STORE   = 'dgc_v4';
  var PENDING = 'dgc_pending';
  var convs     = dgcLoad();
  var activeId  = null;
  var saveTimer = null;
  var observer  = null;

  var elSide    = document.getElementById('dgcSide');
  var elList    = document.getElementById('dgcList');
  var elEmpty   = document.getElementById('dgcEmpty');
  var elNew     = document.getElementById('dgcNew');
  var elToggle  = document.getElementById('dgcToggle');
  var elShowBtn = document.getElementById('dgcShowBtn');

  function dgcLoad() {
    try { return JSON.parse(localStorage.getItem(STORE)) || []; }
    catch(e) { return []; }
  }
  function dgcSave() {
    try { localStorage.setItem(STORE, JSON.stringify(convs)); }
    catch(e) {}
  }

  function createConv(title) {
    var id = 'c' + Date.now();
    convs.unshift({ id:id, title:title || 'Nueva conversación', date:new Date().toISOString(), html:'' });
    if (convs.length > 40) { convs.pop(); }
    dgcSave();
    renderList();
    return id;
  }

  function deleteConv(id, e) {
    e.stopPropagation();
    var next = [];
    for (var i = 0; i < convs.length; i++) {
      if (convs[i].id !== id) { next.push(convs[i]); }
    }
    convs = next;
    dgcSave();
    if (activeId === id) {
      clearChat();
      activeId = (convs.length > 0) ? convs[0].id : createConv();
    }
    renderList();
    markActive(activeId);
  }

  function switchConv(id) {
    if (id === activeId) { return; }
    saveState(activeId);
    activeId = id;
    markActive(id);
    clearChat(function() { restoreState(id); });
  }

  function saveState(id) {
    if (!id) { return; }
    var c = findConv(id);
    if (!c) { return; }
    var conv = getConv();
    if (conv) { c.html = conv.innerHTML; dgcSave(); }
  }

  function restoreState(id) {
    var c = findConv(id);
    if (!c) { return; }
    if (!c.html) { return; }
    var conv = getConv();
    if (!conv) { return; }
    conv.innerHTML = c.html;
    var body = conv.parentElement;
    var tries = 0;
    while (body) {
      if (body.classList.contains('mwai-body')) { break; }
      body = body.parentElement;
      tries++;
      if (tries > 10) { break; }
    }
    if (body) { body.scrollTop = body.scrollHeight; }
  }

  function clearChat(cb) {
    var conv = getConv();
    if (conv) { conv.innerHTML = ''; }
    var input = getInput();
    if (input) { input.value = ''; }
    if (cb) { setTimeout(cb, 60); }
  }

  function getConv()   { return document.querySelector('#dgcBot .mwai-conversation'); }
  function getInput()  { return document.querySelector('#dgcBot textarea, #dgcBot input[type="text"]'); }
  function getSubmit() { return document.querySelector('#dgcBot .mwai-input-submit'); }

  function findConv(id) {
    for (var i = 0; i < convs.length; i++) {
      if (convs[i].id === id) { return convs[i]; }
    }
    return null;
  }

  function fixMwaiHeight() {
    var wrap  = document.getElementById('dgcWrap');
    var bot   = document.getElementById('dgcBot');
    if (!wrap || !bot) { return; }

    var header = wrap.querySelector('.dgc-header');
    var chips  = wrap.querySelector('.dgc-chips-row');
    var headerH = header ? header.offsetHeight : 0;
    var chipsH  = chips  ? chips.offsetHeight  : 0;
    var available = wrap.offsetHeight - headerH - chipsH;
    if (available < 100) { return; }

    var body      = bot.querySelector('.mwai-body');
    var conv      = bot.querySelector('.mwai-conversation');
    var chat      = bot.querySelector('.mwai-chat');
    var winbox    = bot.querySelector('.mwai-window-box');
    var container = bot.querySelector('.mwai-chatbot-container');

    /* Quitar el max-height:calc(100%-20px) que mwai pone como inline style */
    if (chat) {
      chat.style.removeProperty('max-height');
      chat.style.setProperty('max-height',     'none',   'important');
      chat.style.setProperty('height',         available + 'px', 'important');
      chat.style.setProperty('position',       'static', 'important');
      chat.style.setProperty('display',        'flex',   'important');
      chat.style.setProperty('flex-direction', 'column', 'important');
      chat.style.setProperty('width',          '100%',   'important');
      chat.style.setProperty('overflow',       'hidden', 'important');
    }
    function setH(el, h) {
      if (!el) { return; }
      el.style.setProperty('height',         h + 'px', 'important');
      el.style.setProperty('max-height',     'none',   'important');
      el.style.setProperty('display',        'flex',   'important');
      el.style.setProperty('flex-direction', 'column', 'important');
      el.style.setProperty('position',       'static', 'important');
      el.style.setProperty('width',          '100%',   'important');
    }
    setH(container, available);
    setH(winbox,    available);
    setH(body,      available);
    if (conv) {
      conv.style.setProperty('flex',       '1',    'important');
      conv.style.setProperty('overflow-y', 'auto', 'important');
      conv.style.setProperty('height',     'auto', 'important');
      conv.style.setProperty('min-height', '0',    'important');
      conv.style.setProperty('max-height', 'none', 'important');
    }
    var input = bot.querySelector('.mwai-input');
    if (input) {
      input.style.setProperty('flex-shrink', '0', 'important');
    }
  }

  function watch() {
    var n = 0;
    var t = setInterval(function() {
      var conv = getConv();
      if (conv) {
        clearInterval(t);
        /* Aplicar varias veces porque mwai puede resetear sus estilos */
        fixMwaiHeight();
        setTimeout(fixMwaiHeight, 200);
        setTimeout(fixMwaiHeight, 600);
        setTimeout(fixMwaiHeight, 1200);
        attach(conv);
        return;
      }
      n++;
      if (n > 30) { clearInterval(t); }
    }, 500);
  }

  function attach(target) {
    if (observer) { observer.disconnect(); }
    observer = new MutationObserver(function() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(autoSave, 1000);
    });
    observer.observe(target, { childList:true, subtree:true, characterData:true });
  }

  function autoSave() {
    if (!activeId) { return; }
    var conv = getConv();
    if (!conv) { return; }
    var c = findConv(activeId);
    if (!c) { return; }
    var first = conv.querySelector('.mwai-user .mwai-text');
    if (first) {
      var txt = (first.textContent || '').trim();
      if (txt) {
        if (c.title === 'Nueva conversación') {
          c.title = (txt.length > 42) ? txt.slice(0,42) + '…' : txt;
          renderList();
          markActive(activeId);
        }
      }
    }
    c.html = conv.innerHTML;
    c.date = new Date().toISOString();
    dgcSave();
  }

  function renderList() {
    var items = elList.querySelectorAll('.dgc-conv-item');
    for (var i = 0; i < items.length; i++) { items[i].remove(); }
    if (convs.length === 0) { elEmpty.style.display = ''; return; }
    elEmpty.style.display = 'none';
    for (var j = 0; j < convs.length; j++) {
      (function(c) {
        var el = document.createElement('div');
        el.className = 'dgc-conv-item';
        el.dataset.id = c.id;
        el.innerHTML =
          '<div class="dgc-conv-ico">&#128172;</div>' +
          '<div class="dgc-conv-info">' +
            '<p class="dgc-conv-title">' + dgcEsc(c.title) + '</p>' +
            '<p class="dgc-conv-date">' + dgcFmt(c.date) + '</p>' +
          '</div>' +
          '<button class="dgc-conv-del">&#10005;</button>';
        el.querySelector('.dgc-conv-del').addEventListener('click', function(e) { deleteConv(c.id, e); });
        el.addEventListener('click', function() { switchConv(c.id); });
        elList.appendChild(el);
      })(convs[j]);
    }
    markActive(activeId);
  }

  function markActive(id) {
    var items = elList.querySelectorAll('.dgc-conv-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.id === id) {
        items[i].classList.add('dgc-active');
      } else {
        items[i].classList.remove('dgc-active');
      }
    }
  }

  window.dgcSendChip = function(text) {
    var input = getInput();
    if (!input) { return; }

    /* Usar setter nativo para activar reactividad de Vue (mwai usa Vue) */
    var nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLTextAreaElement.prototype, 'value');
    if (nativeSetter) {
      nativeSetter.set.call(input, text);
    } else {
      input.value = text;
    }

    /* Event input activa la reactividad de Vue */
    input.dispatchEvent(new Event('input', { bubbles:true }));

    /* Esperar a que Vue procese el cambio y luego enviar con Enter */
    setTimeout(function() {
      var opts = { key:'Enter', code:'Enter', keyCode:13, which:13, bubbles:true, cancelable:true };
      input.dispatchEvent(new KeyboardEvent('keydown',  opts));
      input.dispatchEvent(new KeyboardEvent('keypress', opts));
      input.dispatchEvent(new KeyboardEvent('keyup',    opts));
    }, 120);
  };

  /* Chips: usar data-msg en lugar de onclick para evitar encoding de WordPress */
  var chips = document.querySelectorAll('.dgc-chip[data-msg]');
  for (var ci = 0; ci < chips.length; ci++) {
    (function(chip) {
      chip.addEventListener('click', function() {
        var msg = chip.getAttribute('data-msg');
        if (msg) { window.dgcSendChip(msg); }
      });
    })(chips[ci]);
  }

  elToggle.addEventListener('click', function() {
    elSide.classList.add('dgc-hidden');
    elShowBtn.classList.add('dgc-visible');
  });

  elShowBtn.addEventListener('click', function() {
    elSide.classList.remove('dgc-hidden');
    elShowBtn.classList.remove('dgc-visible');
  });

  document.addEventListener('click', function(e) {
    if (window.innerWidth > 768) { return; }
    if (elSide.contains(e.target)) { return; }
    if (elShowBtn.contains(e.target)) { return; }
    elSide.classList.add('dgc-hidden');
    elShowBtn.classList.add('dgc-visible');
  });

  elNew.addEventListener('click', function() {
    saveState(activeId);
    var newId = createConv();
    try { sessionStorage.setItem(PENDING, newId); } catch(e) {}
    window.location.reload();
  });

  function init() {
    renderList();
    var pending = null;
    try {
      pending = sessionStorage.getItem(PENDING);
      if (pending) { sessionStorage.removeItem(PENDING); }
    } catch(e) {}
    if (pending) {
      if (findConv(pending)) { activeId = pending; }
    }
    if (!activeId) {
      if (convs.length > 0) {
        activeId = convs[0].id;
        if (convs[0].html) {
          setTimeout(function() { restoreState(convs[0].id); }, 800);
        }
      } else {
        activeId = createConv();
      }
    }
    markActive(activeId);
    watch();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  function dgcEsc(s) {
    return String(s)
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function dgcFmt(iso) {
    var d    = new Date(iso);
    var diff = new Date() - d;
    if (diff < 60000)    { return 'Ahora'; }
    if (diff < 3600000)  { return Math.floor(diff / 60000)   + ' min'; }
    if (diff < 86400000) { return Math.floor(diff / 3600000) + ' h'; }
    return d.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
  }

})();
</script>
