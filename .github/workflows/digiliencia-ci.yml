name: Digiliencia CI

on:
  push:
    branches:
      - "**"
    paths:
      - "digiliencia/**"
      - "test/**"
  pull_request:
    branches:
      - main
    paths:
      - "digiliencia/**"
      - "test/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.19
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4JLABS_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
          NEO4J_metrics_enabled: "false"
          NEO4J_STRICT_CONFIG_VALIDATION: "false" # ✅ disables validation so we can use legacy configs
          NEO4J_dbms_memory_heap_max__size: 1G # ✅ correct legacy style with double underscores
          NEO4J_dbms_memory_pagecache_size: 512M
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -q --method=HEAD http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Neo4j client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cypher-shell curl jq netcat-traditional wget

      - name: Wait for Neo4j
        run: |
          echo "Waiting for Neo4j to be fully available..."
          for i in {1..30}; do
            if nc -z localhost 7687; then
              echo "Neo4j port 7687 is open!"
              break
            fi
            echo "Waiting for Neo4j port (attempt $i)..."
            sleep 3
          done

          for i in {1..20}; do
            if curl -s http://localhost:7474/ > /dev/null; then
              echo "Neo4j HTTP interface is responding!"
              break
            fi
            echo "Waiting for Neo4j HTTP interface (attempt $i)..."
            sleep 3
          done

          echo "Giving Neo4j time to complete initialization..."
          sleep 10

          for i in {1..10}; do
            if echo "RETURN 1 AS n;" | cypher-shell -a bolt://localhost:7687 -u neo4j -p testpassword --format plain; then
              echo "✅ Neo4j is ready and accepting queries!"
              exit 0
            fi
            echo "Waiting for Neo4j to accept queries (attempt $i)..."
            sleep 5
          done

          echo "❌ Neo4j failed to initialize properly"
          exit 1

      - name: Configure test database constraints
        run: |
          echo "Setting up Neo4j constraints for tests..."
          cypher-shell -a bolt://localhost:7687 -u neo4j -p testpassword \
            "CREATE CONSTRAINT topic_name_unique IF NOT EXISTS FOR (t:Topic) REQUIRE t.name IS UNIQUE;"
          cypher-shell -a bolt://localhost:7687 -u neo4j -p testpassword \
            "CREATE CONSTRAINT topic_id_unique IF NOT EXISTS FOR (t:Topic) REQUIRE t.id IS UNIQUE;"
          echo "✅ Neo4j constraints configured successfully!"

      - name: Check ruff formatting
        run: uv run ruff format --check
        working-directory: digiliencia

      - name: Lint with ruff
        run: uv run ruff check
        working-directory: digiliencia

      - name: Run tests
        env:
          DDBB_URI: bolt://localhost:7687
          DDBB_USERNAME: neo4j
          DDBB_PASSWD: testpassword
          WEFORUM_EMAIL: ${{ secrets.WEFORUM_EMAIL }}
          WEFORUM_PASSWD: ${{ secrets.WEFORUM_PASSWD }}
          WEBDRIVERWAIT_TIMEOUT: 10
        run: uv run pytest
