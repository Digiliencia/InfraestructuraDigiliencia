name: Digiliencia CI

on:
  push:
    branches:
      - "**"
    paths:
      - "digiliencia/**"
      - "test/**"
  pull_request:
    branches:
      - main
    paths:
      - "digiliencia/**"
      - "test/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Start Neo4j container
        run: |
          docker run -d \
            --name test-neo4j \
            -p 7474:7474 -p 7687:7687 \
            -e NEO4J_AUTH=neo4j/testpassword \
            -e NEO4JLABS_PLUGINS='["apoc"]' \
            -e NEO4J_dbms_security_procedures_unrestricted=apoc.* \
            -e NEO4J_metrics_enabled=false \
            -e NEO4J_STRICT_CONFIG_VALIDATION=false \
            neo4j:5.19

      - name: Wait for Neo4j to be ready
        run: |
          echo "Waiting for Neo4j to be ready..."
          for i in {1..30}; do
            if nc -z localhost 7687 && curl -s http://localhost:7474 > /dev/null; then
              echo "✅ Neo4j is ready!"
              exit 0
            fi
            echo "⏳ Waiting for Neo4j (attempt $i)..."
            sleep 3
          done
          echo "❌ Neo4j did not start in time"
          docker logs test-neo4j
          exit 1

      - name: Configure test database constraints
        run: |
          echo "Setting up Neo4j constraints..."
          docker exec test-neo4j cypher-shell -u neo4j -p testpassword \
            "CREATE CONSTRAINT topic_name_unique IF NOT EXISTS FOR (t:Topic) REQUIRE t.name IS UNIQUE;"
          docker exec test-neo4j cypher-shell -u neo4j -p testpassword \
            "CREATE CONSTRAINT topic_id_unique IF NOT EXISTS FOR (t:Topic) REQUIRE t.id IS UNIQUE;"
          echo "✅ Constraints configured."

      - name: Check ruff formatting
        run: uv run ruff format --check
        working-directory: digiliencia

      - name: Lint with ruff
        run: uv run ruff check
        working-directory: digiliencia

      - name: Run tests
        env:
          DDBB_URI: bolt://localhost:7687
          DDBB_USERNAME: neo4j
          DDBB_PASSWD: testpassword
          WEFORUM_EMAIL: ${{ secrets.WEFORUM_EMAIL }}
          WEFORUM_PASSWD: ${{ secrets.WEFORUM_PASSWD }}
          WEBDRIVERWAIT_TIMEOUT: 10
        run: uv run pytest

      - name: Clean up Neo4j
        if: always()
        run: docker rm -f test-neo4j || true
