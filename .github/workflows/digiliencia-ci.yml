name: Digiliencia CI

on:
  push:
    branches:
      - "**"
    paths:
      - "digiliencia/**"
      - "test/**"
  pull_request:
    branches:
      - main
    paths:
      - "digiliencia/**"
      - "test/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:latest
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_dbms_memory_pagecache_size: 512M
          NEO4J_dbms_memory_heap_initial__size: 512M
          NEO4J_dbms_memory_heap_max__size: 1G
          server_config_strict_validation_enabled: "false"
        ports:
          - 7474:7474
          - 7687:7687
        # Add health check option
        options: >-
          --health-cmd "nc -z localhost 7687 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Neo4j client tools
        run: |
          apt-get update
          apt-get install -y cypher-shell curl jq

      - name: Robust Neo4j readiness check
        run: |
          echo "Waiting for Neo4j port to be available..."
          for i in {1..60}; do
            if nc -z localhost 7687; then
              echo "Neo4j port is open!"
              break
            fi
            echo "Waiting for Neo4j (attempt $i)..."
            sleep 2
          done

          echo "Waiting for Neo4j DBMS to be fully available..."
          for i in {1..20}; do
            if curl -s http://localhost:7474/browser/ > /dev/null; then
              echo "Neo4j HTTP interface is responding!"
              break
            fi
            echo "Waiting for Neo4j HTTP interface (attempt $i)..."
            sleep 3
          done

          echo "Verifying Neo4j connection and authentication..."
          for i in {1..30}; do
            if echo "RETURN 1 AS result" | cypher-shell -a bolt://localhost:7687 -u neo4j -p testpassword --format plain > /dev/null 2>&1; then
              echo "Neo4j authentication and query execution successful!"
              exit 0
            fi
            echo "Waiting for Neo4j to accept authentication (attempt $i)..."
            sleep 2
          done

          echo "Neo4j failed to fully initialize" >&2
          exit 1

      - name: Check ruff formatting
        run: uv run ruff format --check
        working-directory: digiliencia

      - name: Lint with ruff
        run: uv run ruff check
        working-directory: digiliencia

      - name: Configure test database constraints
        run: |
          echo "Setting up Neo4j constraints for tests..."
          cat <<EOF | cypher-shell -a bolt://localhost:7687 -u neo4j -p testpassword
          CREATE CONSTRAINT topic_name_unique IF NOT EXISTS FOR (t:Topic) REQUIRE t.name IS UNIQUE;
          CREATE CONSTRAINT topic_id_unique IF NOT EXISTS FOR (t:Topic) REQUIRE t.id IS UNIQUE;
          EOF
          echo "Neo4j constraints configured successfully!"

      - name: Run tests
        env:
          DDBB_URI: bolt://localhost:7687
          DDBB_USERNAME: neo4j
          DDBB_PASSWD: testpassword
          WEFORUM_EMAIL: ${{ secrets.WEFORUM_EMAIL }}
          WEFORUM_PASSWD: ${{ secrets.WEFORUM_PASSWD }}
          WEBDRIVERWAIT_TIMEOUT: 10
        run: uv run pytest
