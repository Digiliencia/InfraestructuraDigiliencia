name: Digiliencia CI

on:
  push:
    branches:
      - "**"
    paths:
      - "digiliencia/**"
      - "test/**"
  pull_request:
    branches:
      - main
    paths:
      - "digiliencia/**"
      - "test/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:latest
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd="curl -f http://localhost:7474/browser/ || exit 1"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check ruff formatting
        run: uv run ruff format --check
        working-directory: digiliencia

      - name: Lint with ruff
        run: uv run ruff check
        working-directory: digiliencia

      - name: Run tests
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
        run: uv run pytest
