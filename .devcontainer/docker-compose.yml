volumes:
  postgres-data:
  neo4j-data:


networks:
  dev-network:


services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ../:/workspaces/InfraestructuraDiligencia:cached
    command: sleep infinity
    networks:
      - dev-network
    depends_on:
      - db
      - neo4j

  db:
    build:
      context: ..
      dockerfile: digiliencia/configs/postgres-db/DockerFile
    env_file:
      - ../.env
    environment:
      - TESTING=false
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - dev-network

  neo4j:
    image: neo4j:latest
    environment:
      NEO4J_AUTH: neo4j/testpassword
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j-data:/data
    networks:
      - dev-network

  neo4j-test:
    image: neo4j:latest
    environment:
      NEO4J_AUTH: neo4j/testpassword
    ports:
      - "7475:7474" # HTTP
      - "7688:7687" # Bolt
    networks:
      - dev-network
  embedding-api-service:
    build:
      context: ../services/embeddings
      dockerfile: Dockerfile
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8000:8000"
    networks:
      - dev-network
    runtime: nvidia
  fastapi-service:
    build:
      context: ..
      dockerfile: digiliencia/configs/fastAPI/DockerFile
    env_file:
      - ../.env
    environment:
      - LOCAL=false
      - TESTING=false
    depends_on:
      - db
      - redis
      - nginx
    networks:
      - dev-network

  fastapi-service-test:
    build:
      context: ..
      dockerfile: digiliencia/configs/fastAPI/DockerFile
    env_file:
      - ../.env
    environment:
      - LOCAL=false
      - TESTING=true
    ports:
      - "8080:8080"
    depends_on:
      - db # Test database is not created automaticly
      - redis
      - nginx
    networks:
      - dev-network
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - dev-network

  nginx:
    build:
      context: ..
      dockerfile: digiliencia/configs/nginx/DockerFile
    env_file:
      - ../.env
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ../certs:/etc/nginx/ssl:ro # Mount your certificates here
    networks:
      - dev-network
