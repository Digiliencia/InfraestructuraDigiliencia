volumes:
  postgres-data:
  neo4j-data:

networks:
  dev-network:

services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ../:/workspaces/InfraestructuraDiligencia:cached
    command: sleep infinity
    networks:
      - dev-network
    depends_on:
      - db
      - neo4j

  db:
    image: postgres:17-bookworm
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - dev-network

  neo4j:
    image: neo4j:latest
    restart: always
    environment:
      NEO4J_AUTH: neo4j/testpassword
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j-data:/data
    networks:
      - dev-network

  neo4j-test:
    image: neo4j:latest
    restart: always
    environment:
      NEO4J_AUTH: neo4j/testpassword
    ports:
      - "7475:7474" # HTTP
      - "7688:7687" # Bolt
    tmpfs:
      - /data
      - /logs
      - /import
      - /plugins
    networks:
      - dev-network

  classification-service:
    build:
      context: ../classification_microservice
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CLASSIFICATION_SERVICE_HOST=0.0.0.0
      - CLASSIFICATION_SERVICE_PORT=8080
    volumes:
      - ../classification_microservice/logs:/app/logs
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
