services:

  fastapi-service-test:
    build:
      context: ..
      dockerfile: digiliencia/fastAPI/DockerFile
    ports:
      - "8080:8080"
    environment:
      - FASTAPI_HOST=${FASTAPI_HOST}
      - FASTAPI_PORT=${FASTAPI_PORT}
      - TESTING=${TESTING}
      # --- Database Connection ---
      - POSTGRES_SERVER=${POSTGRES_SERVER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      # --- Redis Connection ---
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}

      # --- Security & JWT ---
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_SECONDS=${ACCESS_TOKEN_EXPIRE_SECONDS}

      # --- External Services / LLM ---
      - NEO4J_URL=${NEO4J_URL}
      - WEFORUM_EMAIL=${WEFORUM_EMAIL}
      - WEFORUM_PASSWD=${WEFORUM_PASSWD}
      - LLM_URL=${LLM_URL}
      - CHATBOT_LLM=${CHATBOT_LLM}
      - CLASSIFICATION_MODEL=${CLASSIFICATION_MODEL}
      - EMBEDDINGS_SERVICE=${EMBEDDINGS_SERVICE}
      - EMBEDDINGS_DIMENSION=${EMBEDDINGS_DIMENSION}
      - DDBB_URI=${DDBB_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      - db
      - redis
      - nginx
    networks:
      - dev-network

  db:
    build:
      context: ..
      dockerfile: digiliencia/postgres-db/DockerFile
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TESTING=${TESTING}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - dev-network

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
    #volumes:
    #  - neo4j-data:/data
    networks:
      - dev-network

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - dev-network

  nginx:
    build:
      context: ..
      dockerfile: digiliencia/nginx/DockerFile
    environment:
      - NGINX_HTTP_PORT=${NGINX_HTTP_PORT:-80}
      - NGINX_HTTPS_PORT=${NGINX_HTTPS_PORT:-443}
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ../certs:/etc/nginx/ssl:ro # Mount your certificates here
    networks:
      - dev-network

  embedding-api-service:
    image: busybox
    profiles: [ "donotstart" ]

  devcontainer:
    image: busybox
    profiles: [ "donotstart" ]

volumes:
  postgres-data:
  neo4j-data:


networks:
  dev-network:
